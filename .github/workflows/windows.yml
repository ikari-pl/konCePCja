name: Windows build (MINGW64)

on:
  push:
    branches:
      - '**'
  pull_request:
  release:
    types: [published]

jobs:
  build:
    timeout-minutes: 15
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            ctags
            gcc
            git
            make
            zip
            mingw64/mingw-w64-x86_64-cmake
            mingw64/mingw-w64-x86_64-diffutils
            mingw64/mingw-w64-x86_64-freetype
            mingw64/mingw-w64-x86_64-libpng
            mingw64/mingw-w64-x86_64-pkg-config
            mingw64/mingw-w64-x86_64-toolchain
            mingw64/mingw-w64-x86_64-zlib
            mingw64/mingw-w64-x86_64-7zip
            mingw64/mingw-w64-x86_64-sdl3

      - name: Apply SDL patches
        shell: msys2 {0}
        run: |
          for p in vendor/sdl-patches/*.patch; do
            [ -f "$p" ] && git -C vendor/SDL apply "../../$p"
          done

      # This is awful but we have to pass the mingw64/include directory so that
      # zlib.h can be found because pkg-config doesn't return any cflags for
      # zlib.
      - name: Build konCePCja
        shell: msys2 {0}
        run: |
          # SDL dummy drivers for headless e2e tests (must export explicitly for msys2)
          export SDL_VIDEODRIVER=dummy
          export SDL_AUDIODRIVER=dummy
          make ARCH=win64 CXX=g++ WINE=\"\" CFLAGS="-ID:/a/_temp/msys64/mingw64/include/" debug -j 4 -k
          make ARCH=win64 CXX=g++ WINE=\"\" CFLAGS="-ID:/a/_temp/msys64/mingw64/include/" -j 4 clean
          make ARCH=win64 CXX=g++ WINE=\"\" CFLAGS="-ID:/a/_temp/msys64/mingw64/include/ -Ii686-linux-gnu-capsimage/include" -j 4 -k
          make ARCH=win64 CXX=g++ WINE=\"\" CFLAGS="-ID:/a/_temp/msys64/mingw64/include/ -Ii686-linux-gnu-capsimage/include" WINE=\"\" -j 4 -k unit_test
          # e2e_test skipped on Windows - video plugin tests hang even with SDL dummy driver
          ./test/integrated/test_win_package.sh win64
          ./test/integrated/test_win_deps.sh win64

      # ---- Release-only steps below ----

      - name: Publish latest
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' && github.event.release.tag_name == 'latest'
        with:
          files: release/koncepcja-win64.zip
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')
        with:
          files: release/koncepcja-win64.zip
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
