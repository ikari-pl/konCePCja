name: MSVC build

on:
  push:
    branches:
      - '**'
  pull_request:
  release:
    types: [published]

jobs:
  msvc-build:
    name: MSVC (${{ matrix.config }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # ── vcpkg (cached) ─────────────────────────────────
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '01f602195983451bc83e72f4214af2cbc495aa94'  # 2024.11.16

      # ── Configure ──────────────────────────────────────
      - name: CMake configure
        run: >
          cmake -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      # ── Build ──────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ matrix.config }} -j 4

      # ── Test ───────────────────────────────────────────
      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        working-directory: ${{ github.workspace }}
        run: |
          $testRunner = "build/${{ matrix.config }}/test_runner.exe"
          if (!(Test-Path $testRunner)) {
            $testRunner = "build/test/${{ matrix.config }}/test_runner.exe"
          }
          if (!(Test-Path $testRunner)) {
            # Fall back to searching
            $testRunner = (Get-ChildItem -Path build -Recurse -Filter test_runner.exe | Select-Object -First 1).FullName
          }
          Write-Host "Running: $testRunner"
          & $testRunner --gtest_shuffle
